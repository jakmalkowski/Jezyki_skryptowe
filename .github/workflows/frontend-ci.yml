name: Frontend pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: BASE_URL_DEV="https://example.com" bash ops/frontend/build.sh

  deploy_dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger dev deploy
        env:
          RENDER_FRONTEND_DEV_HOOK: ${{ secrets.RENDER_FRONTEND_DEV_HOOK }}
        run: bash ops/frontend/deploy-dev.sh